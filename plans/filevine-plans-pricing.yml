specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Filevine
providerId: filevine
created: '2026-05-25'
modified: '2026-05-25'
reconciled: false
tags:
  - Legal
  - Case Management
  - SaaS
description: >
  Filevine does not publish per-seat list pricing. Packages are custom-quoted by
  Filevine Sales based on firm size, modules selected (Matters, Intake, LOIS,
  Depositions, Signatures, Periscope, Timely, Client Portal, DataBridge), and
  contract term. A free trial is available. The plan inventory below captures
  the named commercial product surfaces so downstream tooling has a stable
  reference even though dollar amounts are quote-only.
sources:
  - https://www.filevine.com/pricing/
  - https://www.filevine.com/platform/case-management-software/
  - https://www.filevine.com/features/docsplus/
plans:
  - id: filevine-free-trial
    name: Free Trial
    type: trial
    description: Time-limited free trial covering case management, document storage, client communication, and billing features.
    entries:
      - label: Trial seat
        name: trial_seat
        type: flat
        metric: user
        timeFrame: trial
        geo: global
        unit: 1
        price: '0'
        userMultiplied: true
  - id: filevine-matters
    name: Matters
    type: contract-quoted
    description: Filevine's core case management hub — projects, sections, custom fields, phases, workflow automation.
