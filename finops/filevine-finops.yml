description: >
  FOCUS-aligned FinOps profile for Filevine. Filevine is a per-seat, per-module
  SaaS subscription priced via quote rather than published list price. Cost
  attribution is by module (Matters, Intake, LOIS, Depositions, Signatures,
  Periscope, Timely, Client Portal, DataBridge) and by user. Filevine bills
  monthly in USD via Stripe (PCI DSS).
