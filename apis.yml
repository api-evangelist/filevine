- aid: filevine:filevine-identity-api
  name: Filevine Identity API
  tags:
  - Legal
  - Identity
  - Auth
  - OAuth
  humanURL: https://support.filevine.com/hc/en-us/articles/27944810461851-Authenticate-Requests-to-the-API-Gateway
  properties:
  - url: https://support.filevine.com/hc/en-us/articles/27944810461851-Authenticate-Requests-to-the-API-Gateway
    type: Documentation
  - url: https://support.filevine.com/hc/en-us/articles/29937964706203-API-Authentication-Q-A
    type: Documentation
  - url: openapi/filevine-identity-api-openapi.yml
    type: OpenAPI
  - url: graphql/filevine-graphql.md
    type: GraphQL
  description: Exchange a Filevine Personal Access Token (PAT) for a short-lived bearer
    access token used to call the Filevine API Gateway. Tokens are issued at https://identity.filevine.io/connect/token
    with grant_type personal_access_token, the PAT, and a requested scope set. Tokens
    are typically valid for ~20 minutes.
- aid: filevine:filevine-projects-api
  name: Filevine Projects API
  tags:
  - Legal
  - Matters
  - Case Management
  - Projects
  humanURL: https://developer.filevine.io/docs/v2-us/branches/main/31e991e1bfac1-filevine-api-v2
  properties:
  - url: https://developer.filevine.io/docs/v2-us/branches/main/31e991e1bfac1-filevine-api-v2
    type: Documentation
  - url: openapi/filevine-projects-api-openapi.yml
    type: OpenAPI
  - url: json-schema/filevine-project-schema.json
    type: JSONSchema
  - url: json-structure/filevine-project-structure.json
    type: JSONStructure
  - url: json-ld/filevine-context.jsonld
    type: JSONLD
  description: List, create, read, and update Filevine projects (matters/cases). Each
    project belongs to a project type, carries a primary client contact, has a phase,
    and a customizable set of sections and fields. The Projects API is the spine of
    Filevine integrations and is the parent surface for documents, notes, deadlines,
    tasks, and time entries.
