- type: Features
  data:
  - Matters / Projects — customizable per-practice-area templates with sections, custom
    fields, phases, and workflow automation
  - Intake (Lead Docket) — lead capture, referrals, source tracking, conversion to
    matters
  - LOIS — Legal Operating Intelligence System with Ask LOIS, LOIS for Word, AI Drafting,
    Depo CoPilot, Depo Summaries, MedChron, Phase Validation
  - Docs+ — document storage, PDF editing, versioning, tags, folders, locking
  - Vinesign — eSignature packets
  - Outlaw — contract lifecycle management
  - Client Portal — 24/7 case access, status updates, secure messaging
  - Two-way SMS and captured email
  - Timekeeping with context-aware timer, billable rates, expense tracking, invoice
    generation
  - Deadlines and deadline chains with reminders
  - Tasks with auto-assignment, priority, and completion tracking
  - Periscope — analytics and reporting
  - Timely — deadline calculation engine
  - DataBridge — data integration platform
  - REST API v2 with US (api.filevine.io) and Canada (api.filevineapp.ca) gateways
  - PAT-based OAuth 2.0 bearer flow at https://identity.filevine.io/connect/token
  - Webhook subscriptions for project, document, note, deadline, task, and payment
    events with signing keys
  - Default rate limit of 320 req/min/endpoint; 250 req/min for billing endpoints;
    5 req/min for report endpoints
  - SOC 2 Type II (with HIPAA), CJIS 5.9.3/5.9.4, ISO 27001, HIPAA, GDPR, CCPA/CPRA,
    PCI DSS via Stripe
  - FedRAMP Moderate authorization in progress; FIPS 140-3 in progress; ISO 27701/27017/27018
    in progress
  - AES-256 at rest, TLS 1.2/1.3 in transit, 2FA, RBAC, WAF, DDoS protection, public
    bug bounty
  - Bilingual region support — US and Canada deployments
  - Sample SDKs: C#, JavaScript, Python (Filevine/filevine-api-examples)
  sources:
  - https://www.filevine.com
  - https://developer.filevine.io/docs/v2-us/branches/main/31e991e1bfac1-filevine-api-v2
