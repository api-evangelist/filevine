    Deadlines can chain off a parent deadline.
- aid: filevine:filevine-tasks-api
  name: Filevine Tasks API
  tags:
  - Legal
  - Tasks
  - Workflow
  humanURL: https://developer.filevine.io/docs/v2-us/branches/main/31e991e1bfac1-filevine-api-v2
  properties:
  - url: https://developer.filevine.io/docs/v2-us/branches/main/31e991e1bfac1-filevine-api-v2
    type: Documentation
  - url: openapi/filevine-tasks-api-openapi.yml
    type: OpenAPI
  description: List, create, and update assignable to-do items on a project with status,
    priority, due dates, and completion tracking. Tasks are produced by workflow automation
    and by direct user assignment.
- aid: filevine:filevine-time-entries-api
  name: Filevine Time Entries API
  tags:
  - Legal
  - Time
  - Billing
  humanURL: https://developer.filevine.io/docs/v2-us/branches/main/31e991e1bfac1-filevine-api-v2
