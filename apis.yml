position: Provider
description: Filevine is the leading legal case management and operating intelligence
  platform for plaintiff, personal-injury, mass-tort, family, immigration, criminal-defense,
  estate-planning, and government legal teams. The platform combines a customizable
  matter / project system with intake (Lead Docket), documents (Docs+), eSignature
  (Vinesign), contract management (Outlaw), deadline calendaring, time and billing,
  a secure client portal, and the LOIS Legal Operating Intelligence System for AI-assisted
  drafting, deposition prep, and case analysis. Filevine exposes a public REST API
  v2 with US and Canada gateways, PAT-based OAuth bearer authentication, and webhook
  subscriptions for event-driven integrations.
